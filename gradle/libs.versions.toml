[versions]
# Library and plugin versions
kotlin = "2.1.20"
androidGradlePlugin = "8.9.2"
activityCompose = "1.10.1"
coreSplashscreen = "1.0.1"

# Release version
releaseVersion = "1.0.0-SNAPSHOT"

# Trying Kotlin module information
tryingKotlin-groupId = "com.trying.kotlin"

# Practice solutions module information
practiceSolutions-groupId = "com.practice.solutions"

# Android app package information
androidApp-applicationId = "com.compose.android"
androidApp-compileSdkVersion = "35"
androidApp-targetSdkVersion = "35"
androidApp-minSdkVersion = "30"
androidApp-versionCode = "1"
androidApp-versionName = "1.0.0-SNAPSHOT"

# Android app module information
androidApp-groupId = "com.compose.android"

# Compose app module information
composeApp-groupId = "com.compose.app"

[libraries]
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }
core-splashscreen = { module = "androidx.core:core-splashscreen", version.ref = "coreSplashscreen" }

[plugins]
kotlin-compiler = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
android-application = { id = "com.android.application", version.ref = "androidGradlePlugin" }
android-library = { id = "com.android.library", version.ref = "androidGradlePlugin" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }