[versions]
# Library and plugin versions
kotlin = "2.1.20"
androidGradlePlugin = "8.9.2"
composeMultiplatform = "1.7.3"
activityCompose = "1.10.1"
coreSplashscreen = "1.0.1"
voyager = "1.0.1"

# Android app package information
androidApp-applicationId = "com.cmp.android"
androidApp-compileSdkVersion = "35"
androidApp-targetSdkVersion = "35"
androidApp-minSdkVersion = "30"
androidApp-versionCode = "1"
androidApp-versionName = "1.0.0-SNAPSHOT"

# Trying Kotlin module information
tryingKotlin-groupId = "com.trying.kotlin"
tryingKotlin-version = "1.0.0-SNAPSHOT"

# Practice solutions module information
practiceSolutions-groupId = "com.practice.solutions"
practiceSolutions-version = "1.0.0-SNAPSHOT"

# Android app module information
androidApp-groupId = "com.compose.android"
androidApp-version = "1.0.0-SNAPSHOT"

# Desktop app module
dekstopApp-groupId = "com.compose.desktop"
dekstopApp-version = "1.0.0-SNAPSHOT"

# Compose app module information
composeApp-groupId = "com.compose.app"
composeApp-version = "1.0.0-SNAPSHOT"

# Design system module
designSystem-groupId = "com.design.system"
designSystem-version = "1.0.0-SNAPSHOT"

# Shared components module
sharedComponents-groupId = "com.shared.components"
sharedComponents-version = "1.0.0-SNAPSHOT"

# Platform APIs module
platformApis-groupId = "com.platform.apis"
platformApis-version = "1.0.0-SNAPSHOT"

# User onboarding module information
userOnboarding-groupId = "com.user.onboarding"
userOnboarding-version = "1.0.0-SNAPSHOT"

[libraries]
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }
core-splashscreen = { module = "androidx.core:core-splashscreen", version.ref = "coreSplashscreen" }
compose-multiplatform-ui = { module = "org.jetbrains.compose.ui:ui", version.ref = "composeMultiplatform" }
compose-multiplatform-foundation = { module = "org.jetbrains.compose.foundation:foundation", version.ref = "composeMultiplatform" }
compose-multiplatform-resources = { module = "org.jetbrains.compose.components:components-resources", version.ref = "composeMultiplatform" }
voyager-navigator = { module = "cafe.adriel.voyager:voyager-navigator", version.ref = "voyager" }
voyager-screenmodel = { module = "cafe.adriel.voyager:voyager-screenmodel", version.ref = "voyager" }

[plugins]
kotlin-compiler = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
android-application = { id = "com.android.application", version.ref = "androidGradlePlugin" }
android-library = { id = "com.android.library", version.ref = "androidGradlePlugin" }
compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "composeMultiplatform" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }