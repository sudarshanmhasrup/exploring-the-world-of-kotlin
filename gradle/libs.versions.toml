[versions]
# Library and plugins versions
kotlin = "2.2.20"
jetbrainsAnnotations = "26.0.2"

# trying-kotlin module's configuration information
tryingKotlin-group = "com.trying.kotlin"
tryingKotlin-version = "1.0.0"

# kotlin-playground module's configuration information
kotlinPlayground-group = "com.kotlin.playground"
kotlinPlayground-version = "1.0.0"
kotlinPlayground-mainClass = "com.kotlin.playground.PlaygroundKt"

# practice-solutions module's configuration information
practiceSolutions-group = "com.practice.solutions"
practiceSolutions-version = "1.0.0"

[libraries]
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrainsAnnotations" }

[plugins]
application = { id = "application" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }